name: website_deploy_production

on:
  push:
    tags:
      - website/v*
  workflow_dispatch:
    inputs:
      skip_ci_check:
        description: 'Skip CI/CD check (force deploy)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Wait for CI/CD to pass
        if: ${{ !inputs.skip_ci_check }}
        uses: actions/github-script@v7
        with:
          script: |
            // The matching ci_cd run for this SHA may still be running when the
            // tag push fires, so poll listWorkflowRuns until it reaches a
            // terminal state. Distinguishes three cases:
            //   - no run visible yet: API blip, tolerate up to 60s
            //   - run queued / in_progress: keep polling up to the 30 min ceiling
            //   - run completed: pass on success, fail fast on any other conclusion
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const start = Date.now();
            const totalDeadline = start + 30 * 60 * 1000;
            const apiBlipDeadline = start + 60 * 1000;
            const pollIntervalMs = 15_000;

            while (true) {
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci_cd.yaml',
                head_sha: context.sha,
                per_page: 100,
              });

              const latest = workflow_runs
                .slice()
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

              if (!latest) {
                if (Date.now() > apiBlipDeadline) {
                  core.setFailed(`No ci_cd run found for ${context.sha} within 60s — was the commit pushed to master?`);
                  return;
                }
                core.info(`No ci_cd run yet for ${context.sha}; polling…`);
              } else if (latest.status !== 'completed') {
                core.info(`ci_cd run ${latest.id} status=${latest.status}; polling…`);
              } else if (latest.conclusion === 'success') {
                core.info(`ci_cd run ${latest.id} succeeded for ${context.sha}`);
                return;
              } else {
                core.setFailed(`ci_cd run ${latest.id} concluded ${latest.conclusion} for ${context.sha}`);
                return;
              }

              if (Date.now() > totalDeadline) {
                core.setFailed(`Timed out after 30 min waiting for ci_cd on ${context.sha}`);
                return;
              }
              await sleep(pollIntervalMs);
            }

      - name: Checkout ${{ github.sha }}
        uses: actions/checkout@v4

      - name: Use Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: https://registry.npmjs.org/

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            libraries/*/node_modules
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-modules-${{ hashFiles('package-lock.json') }}

      - name: Install NPM dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --audit false --fund false

      - name: Run postinstall scripts (cache hit)
        if: steps.cache-node-modules.outputs.cache-hit == 'true'
        run: npm run postinstall --workspaces --if-present

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/website/.next/cache
          key: ${{ runner.os }}-nextjs-website-${{ hashFiles('package-lock.json') }}-${{ hashFiles('apps/website/**/*.{js,jsx,ts,tsx,mdx,md,json,css}', '!apps/website/node_modules/**', '!apps/website/.next/**', '!apps/website/dist/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-website-${{ hashFiles('package-lock.json') }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-website-prod-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-website-prod-

      - name: Configure k8s deployment
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          mkdir -p ~/.kube
          echo "$K8S_KUBECONFIG" > ~/.kube/config
        env:
          K8S_KUBECONFIG: ${{ secrets.K8S_KUBECONFIG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set production secrets
        run: |
          sed -i 's/^AIRTABLE_PERSONAL_ACCESS_TOKEN=$/AIRTABLE_PERSONAL_ACCESS_TOKEN=${{ secrets.AIRTABLE_PERSONAL_ACCESS_TOKEN }}/' apps/website/.env.local

      - name: Deploy production
        run: npm run deploy:multistage:production --workspace apps/website
