name: website_deploy_production

on:
  push:
    tags:
      - website/v*
  workflow_dispatch:
    inputs:
      skip_ci_check:
        description: 'Skip CI/CD check (force deploy)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Verify CI/CD has passed
        if: ${{ !inputs.skip_ci_check }}
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            // GitHub's listWorkflowRuns endpoint occasionally returns an
            // empty page or only stale entries during transient API blips,
            // so retry a few times and search every run for the SHA rather
            // than trusting the first one returned.
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const maxAttempts = 5;
            let lastRuns = [];
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: 'ci_cd.yaml', head_sha: context.sha, per_page: 100,
              });
              lastRuns = runs;
              if (runs.some((r) => r.status === 'completed' && r.conclusion === 'success')) return;
              if (attempt < maxAttempts) {
                const backoffMs = 2 ** (attempt - 1) * 1000;
                core.warning(`No successful ci_cd run for ${context.sha} on attempt ${attempt}/${maxAttempts}; retrying in ${backoffMs}ms`);
                await sleep(backoffMs);
              }
            }
            const summary = lastRuns.length === 0
              ? 'no runs returned by API'
              : lastRuns.map((r) => `${r.status}/${r.conclusion ?? 'N/A'}`).join(', ');
            core.setFailed(`CI/CD has not passed for ${context.sha} after ${maxAttempts} attempts (${summary})`);

      - name: Checkout ${{ github.sha }}
        uses: actions/checkout@v4

      - name: Use Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: https://registry.npmjs.org/

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            libraries/*/node_modules
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-modules-${{ hashFiles('package-lock.json') }}

      - name: Install NPM dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --audit false --fund false

      - name: Run postinstall scripts (cache hit)
        if: steps.cache-node-modules.outputs.cache-hit == 'true'
        run: npm run postinstall --workspaces --if-present

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/website/.next/cache
          key: ${{ runner.os }}-nextjs-website-${{ hashFiles('package-lock.json') }}-${{ hashFiles('apps/website/**/*.{js,jsx,ts,tsx,mdx,md,json,css}', '!apps/website/node_modules/**', '!apps/website/.next/**', '!apps/website/dist/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-website-${{ hashFiles('package-lock.json') }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-website-prod-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-website-prod-

      - name: Configure k8s deployment
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          mkdir -p ~/.kube
          echo "$K8S_KUBECONFIG" > ~/.kube/config
        env:
          K8S_KUBECONFIG: ${{ secrets.K8S_KUBECONFIG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set production secrets
        run: |
          sed -i 's/^AIRTABLE_PERSONAL_ACCESS_TOKEN=$/AIRTABLE_PERSONAL_ACCESS_TOKEN=${{ secrets.AIRTABLE_PERSONAL_ACCESS_TOKEN }}/' apps/website/.env.local

      - name: Deploy production
        run: npm run deploy:multistage:production --workspace apps/website
