# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-GB"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: false
  review_status: true
  review_details: false
  commit_status: true
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  suggested_reviewers: false
  in_progress_fortune: false
  poem: false
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "DRAFT"
    drafts: false
    base_branches:
      - "master"
      - "main"
  pre_merge_checks:
    custom_checks:
      - name: "Two-PR env var workflow"
        instructions: |
          Check whether this PR modifies both:
          (a) infrastructure env var files: `apps/infra/src/k8s/serviceDefinitions.ts` or `apps/infra/src/k8s/secrets.ts`, AND
          (b) service env validation files: `apps/website/src/lib/api/env.ts` or `apps/pg-sync-service/src/env.ts`.
          If both sides are changed in the same PR, fail this check. Env var changes must be split into two PRs: the infra PR first (to provision secrets and restart pods), then a separate code PR. See `apps/infra/ADDING_ENV_GUIDE.md` for the full workflow.
        mode: "warning"
chat:
  auto_reply: true
